
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תזרים יואב</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f6f3; --surface: #ffffff; --surface2: #f0ede8;
  --border: rgba(0,0,0,0.08); --text: #1a1a18; --text2: #6b6860; --text3: #9c9a94;
  --green: #0F6E56; --green-bg: #E1F5EE; --red: #A32D2D; --red-bg: #FCEBEB;
  --amber: #854F0B; --amber-bg: #FAEEDA; --blue: #185FA5; --blue-bg: #E6F1FB;
  --purple: #5B3FA5; --purple-bg: #EEEDFE;
  --radius: 12px; --radius-sm: 8px;
}
body { font-family: -apple-system,'Segoe UI',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
 
/* HEADER */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.header-title { font-size: 15px; font-weight: 600; }
.header-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
 
/* TAB NAV */
.tab-nav { display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; position: sticky; top: 57px; z-index: 9; overflow-x: auto; scrollbar-width: none; }
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn { padding: 10px 16px; font-size: 13px; color: var(--text2); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; flex-shrink: 0; }
.tab-btn.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
 
/* MONTH SELECTOR */
.month-selector { display: flex; gap: 8px; padding: 12px 20px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.month-selector::-webkit-scrollbar { display: none; }
.month-btn { flex-shrink: 0; padding: 6px 12px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.15s; }
.month-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
 
/* MAIN */
.main { padding: 14px 20px 80px; max-width: 720px; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.loading { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }
.error-msg { background: var(--red-bg); color: var(--red); padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; line-height: 1.6; }
.section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; margin-top: 22px; }
.section-label:first-child { margin-top: 6px; }
 
/* METRICS */
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; }
.metric { background: var(--surface2); border-radius: var(--radius-sm); padding: 11px 13px; }
.metric .m-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
.metric .m-value { font-size: 19px; font-weight: 600; color: var(--text); line-height: 1.1; }
.metric .m-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.metric.good .m-value { color: var(--green); }
.metric.warn .m-value { color: var(--amber); }
.metric.bad .m-value { color: var(--red); }
 
/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 15px; margin-bottom: 10px; }
.row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.row:last-child { border-bottom: none; }
.row-name { color: var(--text2); }
.row-val { font-weight: 500; }
.total-row { display: flex; justify-content: space-between; font-weight: 600; font-size: 14px; border-top: 1px solid var(--border); padding-top: 9px; margin-top: 5px; }
 
/* DAILY */
.daily-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.daily-row:last-child { border-bottom: none; }
.day-date { width: 80px; color: var(--text2); flex-shrink: 0; }
.day-bar-track { flex: 1; height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.day-bar-fill { height: 7px; border-radius: 4px; }
.day-amount { width: 60px; text-align: left; flex-shrink: 0; }
.day-saving { width: 60px; text-align: left; font-size: 11px; flex-shrink: 0; }
 
/* CAT BARS */
.cat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 12px; }
.cat-label { width: 120px; color: var(--text2); text-align: right; flex-shrink: 0; }
.cat-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 9px; overflow: hidden; }
.cat-fill { height: 9px; border-radius: 4px; }
.cat-val { width: 60px; text-align: left; flex-shrink: 0; }
 
/* TAGS */
.tag { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 99px; margin-left: 5px; font-weight: 500; }
.tag-media { background: var(--blue-bg); color: var(--blue); }
.tag-device { background: var(--purple-bg); color: var(--purple); }
.tag-tax { background: var(--amber-bg); color: var(--amber); }
.tag-save { background: var(--green-bg); color: var(--green); }
.tag-transport { background: var(--amber-bg); color: var(--amber); }
.tag-debt { background: var(--red-bg); color: var(--red); }
 
/* BADGE */
.badge { display: inline-flex; align-items: center; font-size: 11px; padding: 3px 9px; border-radius: 99px; }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
 
/* STATUS BADGE */
.status { font-size: 11px; padding: 2px 8px; border-radius: 99px; display: inline-block; }
.status-ok { background: var(--green-bg); color: var(--green); }
.status-warn { background: var(--amber-bg); color: var(--amber); }
.status-bad { background: var(--red-bg); color: var(--red); }
 
/* FAB */
.add-btn { position: fixed; bottom: 24px; left: 24px; width: 50px; height: 50px; border-radius: 50%; background: var(--text); color: #fff; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.2); z-index: 100; display: flex; align-items: center; justify-content: center; }
 
/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.form-row { margin-bottom: 10px; }
.form-row label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 3px; }
.form-row input, .form-row select { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--surface2); color: var(--text); }
.form-row input:focus, .form-row select:focus { outline: none; border-color: var(--text); }
.form-row .two { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.form-actions { display: flex; gap: 8px; margin-top: 14px; }
.btn-primary { flex: 1; padding: 11px; background: var(--text); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-cancel { padding: 11px 18px; background: var(--surface2); color: var(--text2); border: none; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; }
.submit-msg { font-size: 12px; text-align: center; padding: 7px; border-radius: var(--radius-sm); margin-top: 7px; display: none; }
.submit-msg.ok { background: var(--green-bg); color: var(--green); display: block; }
.submit-msg.err { background: var(--red-bg); color: var(--red); display: block; }
 
/* FUND BAR */
.fund-bar-wrap { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 10px; }
.fund-track { width: 100%; height: 10px; background: var(--border); border-radius: 6px; overflow: hidden; margin: 6px 0; }
.fund-fill-g { height: 10px; border-radius: 6px; background: var(--green); }
.fund-fill-r { height: 10px; border-radius: 6px; background: var(--red); }
 
/* ── BANK TAB STYLES ── */
.bank-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; position: relative; overflow: hidden; }
.bank-card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; background: linear-gradient(90deg, var(--blue), var(--purple)); }
.bank-balance { font-size: 2.2rem; font-weight: 700; line-height: 1.1; margin: 6px 0 4px; }
.bank-balance.pos { color: var(--green); }
.bank-balance.warn { color: var(--amber); }
.bank-balance.neg { color: var(--red); }
.bank-meta { font-size: 11px; color: var(--text3); display: flex; gap: 14px; flex-wrap: wrap; }
.bank-edit-row { display: flex; gap: 8px; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.bank-edit-row label { font-size: 11px; color: var(--text3); white-space: nowrap; }
.bank-edit-row input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 13px; width: 120px; direction: ltr; text-align: left; }
.bank-edit-row input:focus { outline: none; border-color: var(--text); }
.bank-update-btn { padding: 7px 14px; background: var(--blue); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; white-space: nowrap; }
.sync-btn { padding: 5px 12px; background: transparent; border: 1px solid var(--border); border-radius: 99px; font-size: 11px; color: var(--text2); cursor: pointer; }
.sync-btn:hover { border-color: var(--blue); color: var(--blue); }
 
.alert-card { border-radius: var(--radius-sm); padding: 11px 14px; margin-bottom: 10px; display: flex; gap: 10px; align-items: flex-start; font-size: 12px; line-height: 1.5; }
.alert-card.warn { background: var(--red-bg); color: var(--red); }
.alert-card.ok { background: var(--green-bg); color: var(--green); }
.alert-card.amber { background: var(--amber-bg); color: var(--amber); }
.alert-icon { font-size: 1rem; flex-shrink: 0; }
.alert-body h4 { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.alert-body p { font-size: 11px; opacity: 0.85; }
 
.forecast-toggle { display: flex; gap: 6px; margin-bottom: 12px; }
.ftoggle { padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-size: 11px; cursor: pointer; }
.ftoggle.active { background: var(--text); color: #fff; border-color: var(--text); }
 
.forecast-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
.fc-row { display: grid; grid-template-columns: 68px 1fr auto auto; gap: 8px; align-items: center; padding: 9px 13px; border-bottom: 1px solid var(--border); font-size: 12px; }
.fc-row:last-child { border-bottom: none; }
.fc-row.fc-header { background: var(--surface2); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
.fc-row.fc-sep { background: var(--surface2); grid-template-columns: 1fr; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; padding: 5px 13px; }
.fc-row.fc-income { border-right: 3px solid var(--green); }
.fc-row.fc-expense { border-right: 3px solid var(--red); }
.fc-row.fc-savings { border-right: 3px solid var(--purple); }
.fc-date { color: var(--text3); }
.fc-pos { color: var(--green); font-weight: 600; }
.fc-neg { color: var(--red); font-weight: 600; }
.fc-sav { color: var(--purple); font-weight: 600; }
.fc-bal { font-size: 11px; font-family: monospace; }
 
.income-evt-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; gap: 8px; }
.income-evt-row:last-child { border-bottom: none; }
.income-evt-name { flex: 1; color: var(--text); }
.income-evt-date { color: var(--text3); font-size: 11px; }
.income-evt-amt { color: var(--green); font-weight: 600; }
 
.od-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
.od-row:last-child { border-bottom: none; }
.od-label { color: var(--text2); }
.od-val { font-weight: 600; }
.od-val.red { color: var(--red); }
.od-val.amber { color: var(--amber); }
 
.ctag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 99px; margin-right: 4px; font-weight: 500; }
.ctag-income { background: var(--green-bg); color: var(--green); }
.ctag-expense { background: var(--red-bg); color: var(--red); }
.ctag-savings { background: var(--purple-bg); color: var(--purple); }
.ctag-maybe { background: var(--amber-bg); color: var(--amber); border: 1px dashed var(--amber); }
 
@media (max-width: 480px) {
  .header { padding: 10px 14px; }
  .tab-nav { padding: 0 14px; }
  .month-selector { padding: 10px 14px 0; }
  .main { padding: 12px 14px 80px; }
  .day-saving { display: none; }
  .metric .m-value { font-size: 17px; }
  .fc-row { grid-template-columns: 56px 1fr auto auto; gap: 5px; }
}
</style>
</head>
<body>
 
<div class="header">
  <div>
    <div class="header-title">תזרים יואב</div>

function fixedForMonth(idx) {
  return FIXED.filter(e => e.untilIdx === undefined || idx <= e.untilIdx);
}
function parseNum(v) {
  if (!v) return 0;
  const n = parseFloat(String(v).replace(/[^\d.-]/g,''));
  return isNaN(n) ? 0 : n;
}
function fmt(n) { return Math.round(n).toLocaleString('he-IL'); }
function fmtILS(n) {
  if (isNaN(n)) return '—';
  return (n < 0 ? '-' : '') + '₪' + Math.abs(Math.round(n)).toLocaleString('he-IL');
}
function toDate(s) {
  const p = s.split('/').map(Number);
  return new Date(p[2] < 100 ? 2000+p[2] : p[2], p[1]-1, p[0]);
}
function mk(label, value, sub, cls) {
  return `<div class="metric ${cls||''}"><div class="m-label">${label}</div><div class="m-value">${value}</div><div class="m-sub">${sub||''}</div></div>`;
}
function addDays(date, n) { const d = new Date(date); d.setDate(d.getDate()+n); return d; }
function fmtDate(d) { return d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'}); }
function daysBetween(a,b) { return Math.round((b-a)/86400000); }
 
async function fetchSheet(tab) {
  if (cache[tab]) return cache[tab];
  const url = 'https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent(tab)+'?key='+API_KEY;
  const res = await fetch(url);
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error((e.error&&e.error.message)||'HTTP '+res.status); }
  const d = await res.json();
  cache[tab] = d.values||[];
  return cache[tab];
}

function processExpenses(rows) {
  let hdr = -1;
  for (let i=0;i<rows.length;i++) { if (rows[i].some(c=>String(c).trim()==='תאריך')) { hdr=i; break; } }
  if (hdr===-1) return [];
  const h = rows[hdr];
  const ci = n => h.findIndex(c=>String(c).trim()===n);
  const C = { day:ci('יום'), date:ci('תאריך'), cat:h.findIndex(c=>String(c).includes('קטגוריה')),
    desc:h.findIndex(c=>String(c).includes('פירוט')), amount:ci('סכום'),
    thb:h.findIndex(c=>String(c).includes('฿')&&String(c).includes('שווי')) };
  if (C.date<0) C.date=2; if (C.day<0) C.day=1; if (C.cat<0) C.cat=3;
  if (C.desc<0) C.desc=4; if (C.amount<0) C.amount=5; if (C.thb<0) C.thb=9;
 
  const days = {}; let curDate=null, curDay='';
  for (let i=hdr+1;i<rows.length;i++) {
    const r=rows[i]; if (!r||r.length<3) continue;
    const dc=String(r[C.date]||'').trim();
    if (/\d{2}\/\d{2}\/\d{2,4}/.test(dc)) { curDate=dc; curDay=String(r[C.day]||'').trim(); }
    if (!curDate) continue;
    if (!days[curDate]) days[curDate]={date:curDate,dayName:curDay,entries:[],total:0};
    const amt=parseNum(r[C.amount]), thb=parseNum(r[C.thb]);
    if (amt>0) { days[curDate].entries.push({cat:String(r[C.cat]||'').trim(),desc:String(r[C.desc]||'').trim(),amt,thb}); days[curDate].total+=thb||0; }
  }
  return Object.values(days).sort((a,b)=>toDate(a.date)-toDate(b.date));
}

function buildForecastEvents(horizonDays) {
  const events = [];
  const start  = new Date(); start.setHours(0,0,0,0);
  const end    = addDays(start, horizonDays);
 
  let cursor = new Date(start.getFullYear(), start.getMonth(), 1);
  while (cursor <= end) {
    const y = cursor.getFullYear(), m = cursor.getMonth();
    for (const exp of FIXED_FOR_FORECAST) {
      const d = new Date(y, m, exp.day);
      if (d < start || d > end) continue;
      if (exp.until && d > new Date(exp.until)) continue;
      events.push({ date: d, name: exp.name, amount: -exp.amount, type: exp.isSaving ? 'savings' : 'expense', certain: true });
    }
    cursor.setMonth(cursor.getMonth() + 1);
  }
 
  for (const inc of INCOME_EVENTS) {
    const d = new Date(inc.date);
    if (d >= start && d <= end) {
      events.push({ date: d, name: inc.name, amount: inc.amount, type: 'income', certain: inc.certain });
    }
  }
  return events.sort((a,b) => a.date - b.date);
}
 
function renderBank() {
  const el = document.getElementById('bank-content');
  const bal = bankState.balance;
  const today = new Date(); today.setHours(0,0,0,0);
 
  // balance color
  const balCls = bal > 5000 ? 'pos' : bal >= 0 ? 'warn' : 'neg';
  const usedOD = bal < 0 ? Math.abs(bal) : 0;
  const freeOD = OVERDRAFT_LIMIT - usedOD;
 
  // days to salary
  const salaryDate = new Date('2026-10-01');
  const daysToSalary = daysBetween(today, salaryDate);
 
  // remaining fixed this month
  const yr = today.getFullYear(), mo = today.getMonth();
  let remFixed = 0;
  for (const e of FIXED_FOR_FORECAST) {
    const d = new Date(yr, mo, e.day);
    if (d >= today) {
      if (e.until && d > new Date(e.until)) continue;
      remFixed += e.amount;
    }
  }
 
  // projected end-of-month
  const eom = new Date(yr, mo+1, 0);
  const evtsMonth = buildForecastEvents(daysBetween(today, eom));
  let projBal = bal;
  evtsMonth.forEach(e => projBal += e.amount);
 
  // alerts — scan 90 days
  const evts90 = buildForecastEvents(90);
  let running90 = bal, lowestBal = bal, lowestDate = today;
  for (const ev of evts90) {
    running90 += ev.amount;
    if (running90 < lowestBal) { lowestBal = running90; lowestDate = ev.date; }
  }
 
  let alertHtml = '';
  if (lowestBal < -20000) {
    alertHtml = `<div class="alert-card warn"><div class="alert-icon">🚨</div><div class="alert-body"><h4>מינוס עמוק צפוי</h4><p>ב-${fmtDate(lowestDate)} היתרה עלולה להגיע ל-${fmtILS(lowestBal)}</p></div></div>`;
  } else if (lowestBal < 0) {
    alertHtml = `<div class="alert-card amber"><div class="alert-icon">⚠️</div><div class="alert-body"><h4>צפוי לרדת למינוס</h4><p>ב-${fmtDate(lowestDate)} יתרה צפויה: ${fmtILS(lowestBal)} — בתוך המסגרת</p></div></div>`;
  } else {
    alertHtml = `<div class="alert-card ok"><div class="alert-icon">✅</div><div class="alert-body"><h4>תחזית תקינה ל-90 יום</h4><p>יתרה מינימלית צפויה: ${fmtILS(lowestBal)}</p></div></div>`;
  }
 
  // upcoming income
  const upcomingIncome = INCOME_EVENTS
    .filter(e => new Date(e.date) >= today)
    .sort((a,b) => new Date(a.date) - new Date(b.date))
    .slice(0, 6);
 
  const incomeHtml = upcomingIncome.map(e => `
    <div class="income-evt-row">
      <div class="income-evt-name">${e.name} <span class="ctag ${e.certain?'ctag-income':'ctag-maybe'}">${e.certain?'ודאי':'צפוי'}</span></div>
      <div class="income-evt-date">${fmtDate(new Date(e.date))}</div>
      <div class="income-evt-amt">+${fmtILS(e.amount)}</div>
    </div>`).join('');
 
  // forecast table
  const evts = buildForecastEvents(bankState.horizon);
  let runningFc = bal, lastMonth = '', fcRows = `
    <div class="fc-row fc-header"><div>תאריך</div><div>פריט</div><div>סכום</div><div>יתרה</div></div>`;
  for (const ev of evts) {
    const mLabel = ev.date.toLocaleDateString('he-IL',{month:'long',year:'numeric'});
    if (mLabel !== lastMonth) { fcRows += `<div class="fc-row fc-sep">${mLabel}</div>`; lastMonth = mLabel; }
    runningFc += ev.amount;
    const cls = ev.type === 'savings' ? 'fc-savings' : ev.amount > 0 ? 'fc-income' : 'fc-expense';
    const amtCls = ev.type === 'savings' ? 'fc-sav' : ev.amount > 0 ? 'fc-pos' : 'fc-neg';
    const sign = ev.amount > 0 ? '+' : '';
    const balColor = runningFc < 0 ? 'color:var(--red)' : runningFc < 3000 ? 'color:var(--amber)' : 'color:var(--text3)';
    fcRows += `<div class="fc-row ${cls}">
      <div class="fc-date">${fmtDate(ev.date)}</div>
      <div>${ev.name}${!ev.certain?` <span class="ctag ctag-maybe">צפוי</span>`:''}</div>
      <div class="${amtCls}">${sign}${fmtILS(ev.amount)}</div>
      <div class="fc-bal" style="${balColor}">${fmtILS(runningFc)}</div>
    </div>`;
  }
 
  // overdraft cost
  const dailyCost = usedOD * OVERDRAFT_RATE / 365;
  const odHtml = [
    { l: 'מסגרת אוברדראפט מאושרת', v: fmtILS(OVERDRAFT_LIMIT), cls: '' },
    { l: 'בשימוש כרגע',             v: fmtILS(usedOD),          cls: usedOD > 20000 ? 'red' : usedOD > 0 ? 'amber' : '' },
    { l: 'מסגרת פנויה',             v: fmtILS(freeOD),          cls: '' },
    { l: 'ריבית שנתית (10%)',        v: fmtILS(usedOD * OVERDRAFT_RATE), cls: usedOD > 0 ? 'red' : '' },
    { l: 'עלות חודשית (בקירוב)',     v: fmtILS(dailyCost * 30),  cls: usedOD > 0 ? 'amber' : '' },
  ].map(r => `<div class="od-row"><div class="od-label">${r.l}</div><div class="od-val ${r.cls}">${r.v}</div></div>`).join('');
 
  el.innerHTML = `
    <!-- Balance card -->
    <div class="section-label" style="display:flex;justify-content:space-between;align-items:center">
      <span>יתרת עו"ש — בנק לאומי</span>
      <button class="sync-btn" onclick="syncBalanceFromSheet()">↻ רענן מגיליון</button>
    </div>
    <div class="bank-card">
      <div style="font-size:11px;color:var(--text3)">יתרה נוכחית</div>
      <div class="bank-balance ${balCls}">${fmtILS(bal)}</div>
      <div class="bank-meta">
        <span>מינוס בשימוש: ${fmtILS(usedOD)}</span>
        <span>מסגרת פנויה: ${fmtILS(freeOD)}</span>
        ${bankState.lastSync ? `<span>סונכרן: ${bankState.lastSync}</span>` : ''}
      </div>
      <div class="bank-edit-row">
        <label>עדכון ידני:</label>
        <input type="number" id="manual-balance-input" placeholder="${Math.round(bal)}" step="1">
        <button class="bank-update-btn" onclick="updateBankBalance()">עדכן</button>
      </div>
    </div>
 
    <!-- 3 metrics -->
    <div class="metrics" style="margin-bottom:14px">
      ${mk('ימים עד משכורת', daysToSalary > 0 ? daysToSalary : '✓', '1 באוקטובר 2026', daysToSalary > 60 ? 'warn' : '')}
      ${mk('קבועות נותרות', fmtILS(remFixed), 'עד סוף החודש', remFixed > bal ? 'bad' : 'warn')}
      ${mk('יתרה סוף חודש', fmtILS(projBal), 'תחזית', projBal < 0 ? 'bad' : projBal < 3000 ? 'warn' : 'good')}
    </div>
 
    <!-- Alerts -->
    ${alertHtml}
 
    <!-- Upcoming income -->
    <div class="section-label">📥 צפי הכנסות קרובות</div>
    <div class="card">${incomeHtml || '<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">אין הכנסות צפויות ב-90 הימים הקרובים</div>'}</div>
 
    <!-- Forecast -->
    <div class="section-label" style="display:flex;justify-content:space-between;align-items:center">
      <span>📊 תחזית תזרים</span>
      <div class="forecast-toggle">
        <button class="ftoggle ${bankState.horizon===30?'active':''}" onclick="setBankHorizon(30,this)">30י׳</button>
        <button class="ftoggle ${bankState.horizon===60?'active':''}" onclick="setBankHorizon(60,this)">60י׳</button>
        <button class="ftoggle ${bankState.horizon===90?'active':''}" onclick="setBankHorizon(90,this)">90י׳</button>
      </div>
    </div>
    <div class="forecast-table">${fcRows}</div>
 
    <!-- Overdraft cost -->
    <div class="section-label">⚠️ עלות אוברדראפט</div>
    <div class="card">${odHtml}</div>
  `;
}
 
function setBankHorizon(days, btn) {
  bankState.horizon = days;
  renderBank();
}
 
function updateBankBalance() {
  const val = parseFloat(document.getElementById('manual-balance-input').value);
  if (isNaN(val)) { alert('נא להזין מספר'); return; }
  bankState.balance = val;
  bankState.lastSync = 'ידנית ' + new Date().toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'});
  renderBank();
}
 
async function syncBalanceFromSheet() {
  try {
    const res = await fetch(WEBHOOK + '?action=getBankBalance');
    const data = await res.json();
    if (data && data.balance !== undefined) {
      bankState.balance = Number(data.balance);
      bankState.lastSync = new Date().toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'});
      renderBank();
    } else { alert('לא נמצאה יתרת עו"ש בגיליון. ניתן לעדכן ידנית.'); }
  } catch(e) { alert('שגיאה בסנכרון. ניתן לעדכן ידנית.'); }
}
 
// ===== TABS =====
function switchTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['expenses','income','fund','bank'][i]===tab));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab==='income') loadIncome();
  else if (tab==='fund') loadFund();
  else if (tab==='bank') renderBank();
}
 
// ===== MODALS =====
function openModal() {
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const today=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  if (currentTab==='expenses') {
    document.getElementById('f-date').value=today;
    document.getElementById('f-amount').value='';
    document.getElementById('f-desc').value='';
    document.getElementById('msg-expense').className='submit-msg';
    document.getElementById('modal-expense').classList.add('open');
  } else if (currentTab==='income') {
    document.getElementById('i-start').value=today;
    document.getElementById('i-end').value=today;
    document.getElementById('i-amount').value='';
    document.getElementById('i-name').value='';
    document.getElementById('msg-income').className='submit-msg';
    document.getElementById('modal-income').classList.add('open');
  } else if (currentTab==='fund') {
    document.getElementById('fu-date').value=today;
    document.getElementById('fu-amount').value='';
    document.getElementById('fu-desc').value='';
    document.getElementById('msg-fund').className='submit-msg';
    document.getElementById('modal-fund').classList.add('open');
  }
}
 
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeModalOutside(e,id) { if (e.target===document.getElementById(id)) closeModal(id); }
 
async function sendToWebhook(payload, msgId, successCb) {
  const btn=document.querySelector('#'+msgId.replace('msg-','modal-')+' .btn-primary');
  const msgEl=document.getElementById(msgId);
  if (btn) { btn.textContent='שולח...'; btn.disabled=true; }
  try {
    await fetch(WEBHOOK,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    msgEl.textContent='✓ נשמר בגיליון';
    msgEl.className='submit-msg ok';
    if (btn) { btn.textContent='הוסף'; btn.disabled=false; }
    setTimeout(()=>{ successCb && successCb(); },1500);
  } catch(e) {
    msgEl.textContent='שגיאה בשליחה — נסה שוב';
    msgEl.className='submit-msg err';
    if (btn) { btn.textContent='הוסף'; btn.disabled=false; }
  }
}
 
async function submitExpense() {
  const amount=parseFloat(document.getElementById('f-amount').value);
  if (!amount||amount<=0) { const m=document.getElementById('msg-expense'); m.textContent='יש להזין סכום'; m.className='submit-msg err'; return; }
  const dateVal=document.getElementById('f-date').value;
  const [y,mo,d]=dateVal.split('-');
  const dateStr=d+'/'+mo+'/'+String(y).slice(2);
  await sendToWebhook({category:document.getElementById('f-cat').value,description:document.getElementById('f-desc').value,amount,currency:document.getElementById('f-currency').value,date:dateStr},'msg-expense',()=>{
    delete cache[MONTHS[currentMonthIdx]];
    closeModal('modal-expense');
    loadExpenses(MONTHS[currentMonthIdx],currentMonthIdx);
  });
}
 
async function submitIncome() {
  const amount=parseFloat(document.getElementById('i-amount').value);
  if (!amount||amount<=0) { const m=document.getElementById('msg-income'); m.textContent='יש להזין סכום'; m.className='submit-msg err'; return; }
  if (!document.getElementById('i-name').value.trim()) { const m=document.getElementById('msg-income'); m.textContent='יש להזין שם פרויקט'; m.className='submit-msg err'; return; }
  await sendToWebhook({type:'income',projectName:document.getElementById('i-name').value,workType:document.getElementById('i-type').value,amount,currency:document.getElementById('i-currency').value,startDate:document.getElementById('i-start').value,endDate:document.getElementById('i-end').value,invoice:document.getElementById('i-invoice').value,paid:document.getElementById('i-paid').value},'msg-income',()=>{
    delete cache['הכנסות ופרויקטים'];
    closeModal('modal-income');
    loadIncome();
  });
}
 
async function submitFund() {
  const amount=parseFloat(document.getElementById('fu-amount').value);
  if (!amount||amount<=0) { const m=document.getElementById('msg-fund'); m.textContent='יש להזין סכום'; m.className='submit-msg err'; return; }
  await sendToWebhook({type:'fund',description:document.getElementById('fu-desc').value,amount,currency:document.getElementById('fu-currency').value,date:document.getElementById('fu-date').value},'msg-fund',()=>{
    delete cache['קופת חריגות'];
    closeModal('modal-fund');
    loadFund();
  });
}
 
// ===== INIT =====
const sel=document.getElementById('month-selector');
MONTHS.forEach((m,i)=>{
  const btn=document.createElement('button');
  btn.className='month-btn'; btn.dataset.idx=i; btn.textContent=m;
  btn.onclick=()=>loadExpenses(m,i); sel.appendChild(btn);
});
const now=new Date();
const defIdx=now.getFullYear()===2026?Math.max(0,Math.min(7,now.getMonth()-4)):Math.max(8,Math.min(11,now.getMonth()+8));
loadExpenses(MONTHS[defIdx],defIdx);
</script>
</body>
</html>
