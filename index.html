
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מצב חשבון ותחזית</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --text: #e8eaf6;
    --text-dim: #7b82a8;
    --green: #4caf82;
    --red: #e05c6a;
    --yellow: #f5a623;
    --blue: #5b8dee;
    --purple: #9b6dff;
    --font-main: 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'Courier New', monospace;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    min-height: 100vh;
    padding: 24px 16px;
  }
 
  /* ─── BANK STATUS WIDGET ─── */
  .bank-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
 
  .bank-header h2 {
    font-size: 1.1rem;
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-size: 0.8rem;
  }
 
  .sync-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font-main);
  }
  .sync-btn:hover { border-color: var(--blue); color: var(--blue); }
 
  .balance-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
 
  .balance-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--blue), var(--purple));
  }
 
  .balance-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
 
  .balance-amount {
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 6px;
  }
 
  .balance-amount.positive { color: var(--green); }
  .balance-amount.negative { color: var(--red); }
  .balance-amount.warning { color: var(--yellow); }
 
  .balance-meta {
    font-size: 0.78rem;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
 
  .balance-meta span { display: flex; align-items: center; gap: 4px; }
 
  /* Editable input */
  .edit-balance-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
 
  .edit-balance-row label {
    font-size: 0.78rem;
    color: var(--text-dim);
    white-space: nowrap;
  }
 
  .edit-balance-row input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.9rem;
    font-family: var(--font-mono);
    width: 140px;
    text-align: left;
    direction: ltr;
  }
 
  .edit-balance-row input:focus {
    outline: none;
    border-color: var(--blue);
  }
 
  .update-btn {
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 0.82rem;
    cursor: pointer;
    font-family: var(--font-main);
    transition: opacity 0.2s;
  }
  .update-btn:hover { opacity: 0.85; }
 
  /* ─── METRICS ROW ─── */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
 
  @media (max-width: 600px) {
    .metrics-grid { grid-template-columns: 1fr 1fr; }
  }
 
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
 
  .metric-value {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
 
  .metric-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    line-height: 1.3;
  }
 
  /* ─── FORECAST SECTION ─── */
  .section-title {
    font-size: 0.78rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
 
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
 
  /* ─── FORECAST TABLE ─── */
  .forecast-table {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 24px;
  }
 
  .forecast-row {
    display: grid;
    grid-template-columns: 100px 1fr auto auto;
    gap: 12px;
    align-items: center;
    padding: 13px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
 
  .forecast-row:last-child { border-bottom: none; }
 
  .forecast-row.header {
    background: var(--surface2);
    font-size: 0.72rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
 
  .forecast-row.income { border-right: 3px solid var(--green); }
  .forecast-row.expense { border-right: 3px solid var(--red); }
  .forecast-row.savings { border-right: 3px solid var(--purple); }
  .forecast-row.balance-row { border-right: 3px solid var(--blue); background: rgba(91,141,238,0.05); }
 
  .forecast-row.separator {
    background: var(--surface2);
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 6px 20px;
    grid-template-columns: 1fr;
  }
 
  .tag {
    display: inline-block;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .tag.income { background: rgba(76,175,130,0.15); color: var(--green); }
  .tag.expense { background: rgba(224,92,106,0.15); color: var(--red); }
  .tag.savings { background: rgba(155,109,255,0.15); color: var(--purple); }
  .tag.bonus { background: rgba(245,166,35,0.15); color: var(--yellow); }
  .tag.conditional { background: rgba(245,166,35,0.08); color: var(--yellow); border: 1px dashed var(--yellow); }
 
  .amount-positive { color: var(--green); font-weight: 600; }
  .amount-negative { color: var(--red); font-weight: 600; }
  .amount-savings { color: var(--purple); font-weight: 600; }
 
  .date-col { color: var(--text-dim); font-size: 0.78rem; }
 
  /* ─── CHART BAR ─── */
  .forecast-chart {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 24px;
  }
 
  .chart-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
 
  .chart-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    width: 60px;
    text-align: right;
    flex-shrink: 0;
  }
 
  .chart-bar-wrap {
    flex: 1;
    background: var(--surface2);
    border-radius: 4px;
    height: 22px;
    position: relative;
    overflow: visible;
  }
 
  .chart-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
    position: relative;
    min-width: 2px;
  }
 
  .chart-bar.pos { background: linear-gradient(90deg, var(--green), #6dd4a8); }
  .chart-bar.neg { background: linear-gradient(90deg, var(--red), #e88a93); }
 
  .chart-value {
    font-size: 0.73rem;
    font-weight: 600;
    margin-right: 8px; /* RTL: left side */
    white-space: nowrap;
    color: var(--text);
  }
 
  /* zero line */
  .zero-line {
    position: absolute;
    top: -4px;
    bottom: -4px;
    width: 2px;
    background: var(--border);
    pointer-events: none;
  }
 
  /* ─── INCOME FORECAST SECTION ─── */
  .income-forecast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 24px;
  }
 
  .income-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .income-row:last-child { border-bottom: none; }
 
  .income-source {
    font-size: 0.85rem;
    color: var(--text);
    flex: 1;
  }
 
  .income-date {
    font-size: 0.75rem;
    color: var(--text-dim);
  }
 
  .income-amount {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--green);
    font-family: var(--font-mono);
  }
 
  /* ─── OVERDRAFT WARNING ─── */
  .warning-card {
    background: rgba(224,92,106,0.08);
    border: 1px solid rgba(224,92,106,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
 
  .warning-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }
 
  .warning-text h4 {
    font-size: 0.85rem;
    color: var(--red);
    margin-bottom: 4px;
  }
 
  .warning-text p {
    font-size: 0.78rem;
    color: var(--text-dim);
    line-height: 1.5;
  }
 
  .good-card {
    background: rgba(76,175,130,0.08);
    border: 1px solid rgba(76,175,130,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
 
  .good-text h4 {
    font-size: 0.85rem;
    color: var(--green);
    margin-bottom: 4px;
  }
 
  .good-text p {
    font-size: 0.78rem;
    color: var(--text-dim);
    line-height: 1.5;
  }
 
  /* ─── HORIZON TOGGLE ─── */
  .toggle-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
 
  .toggle-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font-main);
  }
 
  .toggle-btn.active {
    background: var(--blue);
    border-color: var(--blue);
    color: white;
  }
 
  /* ─── OVERDRAFT COST ─── */
  .overdraft-meter {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 24px;
  }
 
  .od-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 0.83rem;
    border-bottom: 1px solid var(--border);
  }
  .od-row:last-child { border-bottom: none; }
  .od-label { color: var(--text-dim); }
  .od-value { font-weight: 600; font-family: var(--font-mono); }
  .od-value.red { color: var(--red); }
  .od-value.yellow { color: var(--yellow); }
 
  /* Timestamp */
  .last-updated {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-align: center;
    margin-top: 24px;
    opacity: 0.6;
  }
</style>
</head>
<body>
 
<!-- ─── BANK STATUS ─── -->
<div class="bank-header">
  <h2>🏦 מצב חשבון בנק</h2>
  <button class="sync-btn" onclick="syncFromSheet()">↻ רענן מגיליון</button>
</div>
 
<div class="balance-card">
  <div class="balance-label">יתרת עו"ש — בנק לאומי</div>
  <div class="balance-amount" id="mainBalance">...</div>
  <div class="balance-meta">
    <span id="overdraftUsed">—</span>
    <span id="overdraftFree">—</span>
    <span id="lastSyncTime">לא סונכרן</span>
  </div>
  <div class="edit-balance-row">
    <label>עדכון ידני:</label>
    <input type="number" id="manualBalanceInput" placeholder="7352" step="1" />
    <button class="update-btn" onclick="updateBalance()">עדכן</button>
  </div>
</div>
 
<!-- Metrics -->
<div class="metrics-grid">
  <div class="metric-card">
    <div class="metric-value" id="metricDaysUntilSalary" style="color: var(--blue)">—</div>
    <div class="metric-label">ימים עד משכורת</div>
  </div>
  <div class="metric-card">
    <div class="metric-value" id="metricFixedOutgoing" style="color: var(--red)">—</div>
    <div class="metric-label">קבועות שנותרו<br>לשלם החודש</div>
  </div>
  <div class="metric-card">
    <div class="metric-value" id="metricProjectedBalance" style="color: var(--yellow)">—</div>
    <div class="metric-label">יתרה צפויה<br>סוף החודש</div>
  </div>
</div>
 
<!-- ─── ALERTS ─── -->
<div id="alertsContainer"></div>
 
<!-- ─── INCOME FORECAST ─── -->
<div class="section-title">📥 צפי הכנסות קרובות</div>
 
<div class="income-forecast" id="incomeForecastContainer">
  <!-- filled by JS -->
</div>
 
<!-- ─── HORIZON TOGGLE ─── -->
<div class="section-title">📊 תחזית תזרים</div>
 
<div class="toggle-row">
  <button class="toggle-btn active" onclick="setHorizon(30, this)">30 יום</button>
  <button class="toggle-btn" onclick="setHorizon(60, this)">60 יום</button>
  <button class="toggle-btn" onclick="setHorizon(90, this)">90 יום</button>
</div>
 
<!-- Forecast visual chart -->
<div class="forecast-chart">
  <div id="chartContainer"><!-- filled by JS --></div>
</div>
 
<!-- Forecast table -->
<div class="section-title">📋 אירועים צפויים</div>
<div class="forecast-table" id="forecastTableContainer">
  <!-- filled by JS -->
</div>
 
<!-- ─── OVERDRAFT COST ─── -->
<div class="section-title">⚠️ עלות אוברדראפט</div>
 
<div class="overdraft-meter" id="overdraftCostContainer">
  <!-- filled by JS -->
</div>
 
<div class="last-updated" id="lastUpdatedText">—</div>
 
<script>
// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
 
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbwz2BW_xN8dHgc-_DLLEBoOmLP3FLnqHVw7lFMyWMZLJVV8tJ71iL6VQVqcD8I-YhI/exec';
const OVERDRAFT_LIMIT = 50000; // ₪
const OVERDRAFT_RATE  = 0.10;  // 10% שנתי
 
// הוצאות קבועות מדויקות לפי מה שסיכמנו
const FIXED_EXPENSES = [
  { name: 'ביטוח לאומי שוטף',   amount: 960,  day: 1,  until: null,           type: 'expense' },
  { name: 'פריסת ביטוח לאומי',  amount: 2100, day: 8,  until: '2027-05-31',   type: 'expense' },
  { name: 'הסדר חוב ביטוח לאומי', amount: 280, day: 18, until: '2026-10-31',  type: 'expense' },
  { name: 'החזר הלוואה מס הכנסה', amount: 1100, day: 1, until: null,          type: 'expense' },
  { name: 'מנויים ומכשירים',     amount: 729,  day: 1,  until: null,           type: 'expense' },
  { name: 'שכירות אופנוע',       amount: 496,  day: 1,  until: null,           type: 'expense' },
  { name: 'פנסיה + השתלמות',     amount: 2000, day: 15, until: null,           type: 'savings' },
];
 
// הכנסות ידועות
const INCOME_EVENTS = [
  { name: 'משכורת ($3,500)',   date: '2026-10-01', amount: 10500, currency: '₪', certain: true  },
  { name: 'בונוס (~$500)',     date: '2026-07-08', amount: 1750,  currency: '₪', certain: false },
  { name: 'בונוס (~$500)',     date: '2026-07-22', amount: 1750,  currency: '₪', certain: false },
  { name: 'בונוס (~$500)',     date: '2026-08-05', amount: 1750,  currency: '₪', certain: false },
  { name: 'בונוס (~$500)',     date: '2026-08-19', amount: 1750,  currency: '₪', certain: false },
  { name: 'בונוס (~$500)',     date: '2026-09-02', amount: 1750,  currency: '₪', certain: false },
  { name: 'בונוס (~$500)',     date: '2026-09-16', amount: 1750,  currency: '₪', certain: false },
  { name: 'בונוס (~$500)',     date: '2026-09-30', amount: 1750,  currency: '₪', certain: false },
];
 
let state = {
  balance: 7352, // יתרה נוכחית
  horizon: 30,
  lastSync: null
};
 
// ══════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════
 
function formatILS(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(Math.round(n));
  const formatted = abs.toLocaleString('he-IL');
  return (n < 0 ? '-' : '') + '₪' + formatted;
}
 
function today() { return new Date(); }
 
function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}
 
function formatDate(date) {
  const d = typeof date === 'string' ? new Date(date) : date;
  return d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit' });
}
 
function daysBetween(a, b) {
  return Math.round((b - a) / 86400000);
}
 
function monthKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
}
 
// ══════════════════════════════════════════════════════
//  BUILD FORECAST EVENTS
//  Returns array of { date, name, amount, type, certain }
//  amount: positive = income, negative = expense
// ══════════════════════════════════════════════════════
 
function buildForecastEvents(horizonDays) {
  const events = [];
  const start  = today();
  const end    = addDays(start, horizonDays);
 
  // ─ Fixed expenses ─
  let cursor = new Date(start);
  cursor.setDate(1); // start from first of current month
 
  while (cursor <= end) {
    const year  = cursor.getFullYear();
    const month = cursor.getMonth();
 
    for (const exp of FIXED_EXPENSES) {
      const eventDate = new Date(year, month, exp.day);
      if (eventDate < start || eventDate > end) continue;
 
      // check if still active
      if (exp.until) {
        const untilDate = new Date(exp.until);
        if (eventDate > untilDate) continue;
      }
 
      events.push({
        date:    eventDate,
        name:    exp.name,
        amount:  -exp.amount,
        type:    exp.type,   // 'expense' or 'savings'
        certain: true
      });
    }
 
    // next month
    cursor.setMonth(cursor.getMonth() + 1);
  }
 
  // ─ Income events ─
  for (const inc of INCOME_EVENTS) {
    const d = new Date(inc.date);
    if (d >= start && d <= end) {
      events.push({
        date:    d,
        name:    inc.name,
        amount:  inc.amount,
        type:    'income',
        certain: inc.certain
      });
    }
  }
 
  // sort by date
  events.sort((a, b) => a.date - b.date);
  return events;
}
 
// ══════════════════════════════════════════════════════
//  RUNNING BALANCE — month snapshots for chart
// ══════════════════════════════════════════════════════
 
function buildMonthlySnapshots(events, horizonDays) {
  const snapshots = [];
  let running = state.balance;
  const start = today();
 
  // group by month
  const months = {};
  for (const ev of events) {
    const k = monthKey(ev.date);
    if (!months[k]) months[k] = { label: '', income: 0, outgoing: 0, savings: 0, events: [] };
    months[k].events.push(ev);
    if (ev.type === 'income')   months[k].income   += ev.amount;
    else if (ev.type === 'savings') months[k].savings += Math.abs(ev.amount);
    else                        months[k].outgoing += Math.abs(ev.amount);
  }
 
  let prev = running;
  for (const [k, m] of Object.entries(months)) {
    const [y, mo] = k.split('-').map(Number);
    const label = new Date(y, mo-1, 1).toLocaleDateString('he-IL', { month: 'short', year: '2-digit' });
    const net = m.income - m.outgoing - m.savings;
    running = prev + net;
    snapshots.push({ label, income: m.income, outgoing: m.outgoing, savings: m.savings, endBalance: running });
    prev = running;
  }
 
  return snapshots;
}
 
// ══════════════════════════════════════════════════════
//  RENDER MAIN BALANCE
// ══════════════════════════════════════════════════════
 
function renderBalance() {
  const bal   = state.balance;
  const el    = document.getElementById('mainBalance');
  const text  = formatILS(bal);
 
  if (bal > 5000) {
    el.textContent = text;
    el.className   = 'balance-amount positive';
  } else if (bal >= 0) {
    el.textContent = text;
    el.className   = 'balance-amount warning';
  } else {
    el.textContent = text;
    el.className   = 'balance-amount negative';
  }
 
  const usedOD  = bal < 0 ? Math.abs(bal) : 0;
  const freeOD  = OVERDRAFT_LIMIT - usedOD;
  document.getElementById('overdraftUsed').textContent = `מינוס בשימוש: ${formatILS(usedOD)}`;
  document.getElementById('overdraftFree').textContent = `מסגרת פנויה: ${formatILS(freeOD)}`;
 
  if (state.lastSync) {
    document.getElementById('lastSyncTime').textContent = 'סונכרן: ' + state.lastSync;
  }
}
 
// ══════════════════════════════════════════════════════
//  RENDER METRICS
// ══════════════════════════════════════════════════════
 
function renderMetrics() {
  const t = today();
 
  // days until salary (1 Oct 2026)
  const salaryDate   = new Date('2026-10-01');
  const daysToSalary = daysBetween(t, salaryDate);
  document.getElementById('metricDaysUntilSalary').textContent =
    daysToSalary > 0 ? daysToSalary : '✓';
 
  // fixed still remaining this month
  const thisMonth = t.getMonth();
  const thisYear  = t.getFullYear();
  let remainingFixed = 0;
  for (const exp of FIXED_EXPENSES) {
    const expDate = new Date(thisYear, thisMonth, exp.day);
    if (expDate >= t) {
      if (exp.until && new Date(exp.until) < expDate) continue;
      remainingFixed += exp.amount;
    }
  }
  document.getElementById('metricFixedOutgoing').textContent = formatILS(remainingFixed);
 
  // projected end-of-month balance
  const events = buildForecastEvents(daysBetween(t, new Date(thisYear, thisMonth+1, 0)));
  let proj = state.balance;
  for (const ev of events) proj += ev.amount;
  const projEl = document.getElementById('metricProjectedBalance');
  projEl.textContent = formatILS(proj);
  projEl.style.color = proj < 0 ? 'var(--red)' : proj < 3000 ? 'var(--yellow)' : 'var(--green)';
}
 
// ══════════════════════════════════════════════════════
//  RENDER ALERTS
// ══════════════════════════════════════════════════════
 
function renderAlerts() {
  const container = document.getElementById('alertsContainer');
  container.innerHTML = '';
 
  const events = buildForecastEvents(90);
  let running = state.balance;
  let lowestBalance = state.balance;
  let lowestDate    = today();
 
  for (const ev of events) {
    running += ev.amount;
    if (running < lowestBalance) {
      lowestBalance = running;
      lowestDate    = ev.date;
    }
  }
 
  if (lowestBalance < -20000) {
    container.innerHTML = `
      <div class="warning-card">
        <div class="warning-icon">🚨</div>
        <div class="warning-text">
          <h4>אזהרה: מינוס עמוק צפוי</h4>
          <p>לפי התחזית, ב-${formatDate(lowestDate)} היתרה עלולה להגיע ל-${formatILS(lowestBalance)}.
          זה ${formatILS(Math.abs(lowestBalance))} בתוך המסגרת. ריבית יומית: ~${formatILS(Math.abs(lowestBalance) * OVERDRAFT_RATE / 365)} ₪.</p>
        </div>
      </div>`;
  } else if (lowestBalance < 0) {
    container.innerHTML = `
      <div class="warning-card">
        <div class="warning-icon">⚠️</div>
        <div class="warning-text">
          <h4>צפוי לרדת למינוס</h4>
          <p>לפי התחזית, ב-${formatDate(lowestDate)} היתרה תרד ל-${formatILS(lowestBalance)}. בתוך המסגרת, אבל עולה כסף.</p>
        </div>
      </div>`;
  } else {
    container.innerHTML = `
      <div class="good-card">
        <div class="warning-icon">✅</div>
        <div class="good-text">
          <h4>תחזית תקינה ל-90 יום</h4>
          <p>לפי הנתונים הידועים, החשבון נשאר בפלוס. יתרה מינימלית צפויה: ${formatILS(lowestBalance)}.</p>
        </div>
      </div>`;
  }
}
 
// ══════════════════════════════════════════════════════
//  RENDER INCOME FORECAST
// ══════════════════════════════════════════════════════
 
function renderIncomeForecast() {
  const container = document.getElementById('incomeForecastContainer');
  const upcoming  = INCOME_EVENTS
    .filter(e => new Date(e.date) >= today())
    .sort((a, b) => new Date(a.date) - new Date(b.date))
    .slice(0, 8);
 
  if (upcoming.length === 0) {
    container.innerHTML = '<div style="padding:16px;color:var(--text-dim);font-size:0.82rem;text-align:center">אין הכנסות מתוכננות ב-90 הימים הקרובים</div>';
    return;
  }
 
  container.innerHTML = upcoming.map(inc => `
    <div class="income-row">
      <div class="income-source">
        ${inc.name}
        <span class="tag ${inc.certain ? 'income' : 'conditional'}" style="margin-right:6px">
          ${inc.certain ? 'ודאי' : 'צפוי'}
        </span>
      </div>
      <div class="income-date">${formatDate(inc.date)}</div>
      <div class="income-amount">+${formatILS(inc.amount)}</div>
    </div>
  `).join('');
}
 
// ══════════════════════════════════════════════════════
//  RENDER CHART
// ══════════════════════════════════════════════════════
 
function renderChart() {
  const events    = buildForecastEvents(state.horizon);
  const snapshots = buildMonthlySnapshots(events, state.horizon);
  const container = document.getElementById('chartContainer');
 
  if (snapshots.length === 0) {
    container.innerHTML = '<div style="color:var(--text-dim);font-size:0.82rem;text-align:center;padding:16px">אין נתונים</div>';
    return;
  }
 
  const maxAbs = Math.max(...snapshots.map(s => Math.abs(s.endBalance)), 1);
  const zeroPos = state.balance >= 0 ? 0 : (Math.abs(state.balance) / maxAbs) * 100;
 
  container.innerHTML = snapshots.map(s => {
    const pct  = (Math.abs(s.endBalance) / maxAbs) * 100;
    const isPos = s.endBalance >= 0;
    const color = isPos ? 'pos' : 'neg';
 
    return `
      <div class="chart-row">
        <div class="chart-label">${s.label}</div>
        <div class="chart-bar-wrap">
          <div class="zero-line" style="right: ${zeroPos}%"></div>
          <div class="chart-bar ${color}" style="width: ${pct}%"></div>
        </div>
        <div class="chart-value" style="color: ${isPos ? 'var(--green)' : 'var(--red)'}">
          ${formatILS(s.endBalance)}
        </div>
      </div>`;
  }).join('');
}
 
// ══════════════════════════════════════════════════════
//  RENDER FORECAST TABLE
// ══════════════════════════════════════════════════════
 
function renderForecastTable() {
  const events    = buildForecastEvents(state.horizon);
  const container = document.getElementById('forecastTableContainer');
 
  if (events.length === 0) {
    container.innerHTML = '<div style="padding:20px;color:var(--text-dim);font-size:0.82rem;text-align:center">אין אירועים</div>';
    return;
  }
 
  let running = state.balance;
  let lastMonth = '';
  let rows = `
    <div class="forecast-row header">
      <div>תאריך</div>
      <div>פריט</div>
      <div>סכום</div>
      <div>יתרה</div>
    </div>`;
 
  for (const ev of events) {
    const mLabel = ev.date.toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });
    if (mLabel !== lastMonth) {
      rows += `<div class="forecast-row separator">${mLabel}</div>`;
      lastMonth = mLabel;
    }
 
    running += ev.amount;
    const amtClass = ev.type === 'savings' ? 'amount-savings' :
                     ev.amount > 0 ? 'amount-positive' : 'amount-negative';
    const amtSign  = ev.amount > 0 ? '+' : '';
    const tagClass = ev.type === 'savings' ? 'savings' :
                     ev.amount > 0 ? 'income' : 'expense';
 
    const balColor = running < 0 ? 'var(--red)' : running < 3000 ? 'var(--yellow)' : 'var(--text-dim)';
 
    rows += `
      <div class="forecast-row ${ev.type === 'savings' ? 'savings' : ev.amount > 0 ? 'income' : 'expense'}">
        <div class="date-col">${formatDate(ev.date)}</div>
        <div>
          ${ev.name}
          ${!ev.certain ? '<span class="tag conditional" style="margin-right:4px">צפוי</span>' : ''}
        </div>
        <div class="${amtClass}">${amtSign}${formatILS(ev.amount)}</div>
        <div style="color:${balColor};font-size:0.8rem;font-family:var(--font-mono)">${formatILS(running)}</div>
      </div>`;
  }
 
  container.innerHTML = rows;
}
 
// ══════════════════════════════════════════════════════
//  RENDER OVERDRAFT COST
// ══════════════════════════════════════════════════════
 
function renderOverdraftCost() {
  const container = document.getElementById('overdraftCostContainer');
  const bal = state.balance;
  const usedOD = bal < 0 ? Math.abs(bal) : 0;
 
  const dailyCost   = usedOD * OVERDRAFT_RATE / 365;
  const monthlyCost = dailyCost * 30;
  const yearlyCost  = usedOD * OVERDRAFT_RATE;
 
  const rows = [
    { label: 'ריבית שנתית (10%)',           value: formatILS(yearlyCost),  cls: usedOD > 0 ? 'red' : '' },
    { label: 'עלות חודשית (בקירוב)',         value: formatILS(monthlyCost), cls: usedOD > 0 ? 'yellow' : '' },
    { label: 'עלות יומית',                   value: formatILS(dailyCost),   cls: '' },
    { label: 'מסגרת אוברדראפט מאושרת',      value: formatILS(OVERDRAFT_LIMIT), cls: '' },
    { label: 'מסגרת בשימוש',                value: formatILS(usedOD),      cls: usedOD > 20000 ? 'red' : usedOD > 0 ? 'yellow' : '' },
  ];
 
  container.innerHTML = rows.map(r => `
    <div class="od-row">
      <div class="od-label">${r.label}</div>
      <div class="od-value ${r.cls}">${r.value}</div>
    </div>`).join('');
}
 
// ══════════════════════════════════════════════════════
//  SYNC FROM GOOGLE SHEET
// ══════════════════════════════════════════════════════
 
async function syncFromSheet() {
  const btn = document.querySelector('.sync-btn');
  btn.textContent = '...מסנכרן';
  btn.disabled = true;
 
  try {
    const res = await fetch(WEBHOOK_URL + '?action=getBankBalance', { method: 'GET' });
    const data = await res.json();
    if (data && data.balance !== undefined) {
      state.balance = Number(data.balance);
      state.lastSync = new Date().toLocaleTimeString('he-IL');
      renderAll();
    } else {
      alert('לא נמצאה יתרת עו"ש בגיליון. ניתן לעדכן ידנית למטה.');
    }
  } catch (e) {
    console.error(e);
    alert('שגיאה בסנכרון. ניתן לעדכן ידנית.');
  } finally {
    btn.textContent = '↻ רענן מגיליון';
    btn.disabled = false;
  }
}
 
// ══════════════════════════════════════════════════════
//  MANUAL UPDATE
// ══════════════════════════════════════════════════════
 
function updateBalance() {
  const val = parseFloat(document.getElementById('manualBalanceInput').value);
  if (isNaN(val)) { alert('נא להזין מספר'); return; }
  state.balance = val;
  state.lastSync = 'ידנית — ' + new Date().toLocaleTimeString('he-IL');
  document.getElementById('manualBalanceInput').value = '';
  renderAll();
}
 
// ══════════════════════════════════════════════════════
//  HORIZON TOGGLE
// ══════════════════════════════════════════════════════
 
function setHorizon(days, btn) {
  state.horizon = days;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
  renderForecastTable();
}
 
// ══════════════════════════════════════════════════════
//  RENDER ALL
// ══════════════════════════════════════════════════════
 
function renderAll() {
  renderBalance();
  renderMetrics();
  renderAlerts();
  renderIncomeForecast();
  renderChart();
  renderForecastTable();
  renderOverdraftCost();
  document.getElementById('lastUpdatedText').textContent =
    'עודכן: ' + new Date().toLocaleString('he-IL');
}
 
// Init
renderAll();
</script>
</body>
</html>
